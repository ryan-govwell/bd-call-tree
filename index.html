        { who:`Best-in-class`, quote:`Catch the qualifier — when they say "relatively happy," "it's fine," or "it's usable," reflect it back: "You said relatively happy — what would make it a stronger yes?"` },
      ],
      fail:`Pivoting to a feature pitch. A prospect named it directly on a recorded call: "Good sales pitch. But no." Feature lists confirm the sales-call frame and end the conversation.` },

    /* ---- 02 ---- */
    { num:'02', title:'No Budget',
      freq:`~25–30% of substantive calls`,
      timing:`Mid-call, often after a pricing signal`,
      move:[
        `Challenge the premise — "Have you actually talked to vendors and gotten quotes, or is this more of a gut feeling around budget?"`,
        `If assumed, not researched — reframe to planning: "We work on an 18-month timeline with a lot of cities so they can prepare their next budget with a real number."`,
        `If genuine — anchor a budget-cycle conversation: "When does your budget process typically kick off? People who go in with a directional number usually have an edge getting it approved."`,
      ],
      examples:[
        { who:`Best-in-class`, quote:`"Have you already talked to other vendors and explored pricing, or is this more of a gut feeling around budget?"`, outcome:`Surfaces that the prospect has never actually gotten a quote.` },
        { who:`Best-in-class → meeting booked`, quote:`"We sometimes work on an 18-month timeline so people can prepare budgets down the line."`, outcome:`Prospect: "Yeah, that makes sense. I can do that for the '28 budget year."` },
      ],
      fail:`Accepting "no budget" at face value and saying "okay, I'll call back later."` },

    /* ---- 03 ---- */
    { num:'03', title:'Locked in a Contract',
      freq:`~15–20% of substantive calls`,
      timing:`Late-call, after discovery — when they sense the meeting ask coming`,
      move:[
        `Normalize it — "Everyone I call is in a contract — these sales timelines are 12–18 months, so we start conversations while people are still committed."`,
        `Get the timeline — "How long are you in for?"`,
        `Plant a seed for the renewal window — "When you get to 6–12 months out, that's usually when cities start looking. I'll put a note to connect then."`,
      ],
      examples:[
        { who:`Best-in-class`, quote:`"All I call now has a contract. So that's not too much of a concern since these sales timelines are twelve to eighteen months. So we do start speaking with folks while they're in contract."` },
      ],
      fail:`Contract buyout offer — 100% rejection rate in the dataset. Prospects who just invested in implementation feel threatened by the suggestion.` },

    /* ---- 04 ---- */
    { num:'04', title:'Too Small / Not Enough Volume',
      freq:`~12–15% of substantive calls`,
      timing:`Mid-call, during or after volume qualification`,
      move:[
        `Don't accept the self-disqualification.`,
        `Challenge the assumption directly — "Our software was built for small towns — many of our customers have populations of 5,000 to 10,000 and process 30–100 permits a year. Our pricing reflects that."`,
        `Name similar municipalities they'd recognize, if possible.`,
      ],
      examples:[
        { who:`Best-in-class`, quote:`"Our software was built for small towns and communities. Many of our customers have a population size of five to ten thousand, and our pricing also reflects that."` },
      ],
      fail:`Accepting the self-disqualification without pushing back. Most "too small" prospects are in GovWell's actual sweet spot — the rep just hasn't said so.` },

    /* ---- 05 ---- */
    { num:'05', title:'Not the Decision Maker',
      freq:`~10–12% of substantive calls`,
      timing:`Early-to-mid call`,
      move:[
        `Validate the authority structure — "That makes total sense — this is a multi-stakeholder process."`,
        `Reframe why you're talking to them — "We actually prefer talking to the people who use this daily — if they're not interested, there's no point talking to anyone above them."`,
        `Use it as an intel opportunity — collect names, titles, and internal dynamics before hanging up.`,
      ],
      examples:[
        { who:`Best-in-class`, quote:`"I like to talk to the people who are knee deep in these processes. I'm not trying to sneaky push any decision making your way."`, outcome:`Prospect relaxes and continues talking.` },
        { who:`Best-in-class`, quote:`Uses the "wrong person" to map stakeholders and get a warm referral to the actual decision maker.` },
      ] },

    /* ---- 06 ---- */
    { num:'06', title:'Call Back Later / Bad Timing',
      freq:`~10–12% of substantive calls`,
      timing:`Mid-to-late call`,
      move:[
        `Validate the timing — "Totally understand."`,
        `Get a specific date, not a vague season — "Is there a specific month that tends to be better — after budget season, after a particular project wraps?"`,
        `Make the callback conditional on something real — "I'll reach out in [month]. Is there anything I can send in the meantime that would make that conversation more useful when we connect?"`,
      ],
      fail:`Generic "I'll call back in the fall" with no anchor — effectively lost pipeline.` },

    /* ---- 07 ---- */
    { num:'07', title:'Just Implemented / Mid-Implementation',
      freq:`~8–10% of substantive calls · distinct from "locked in a contract"`,
      timing:`Mid-call, after the system discussion`,
      move:[
        `Validate the sunk cost — "Totally get it — you just went through all that pain to get it live."`,
        `Offer a complementary angle, not a replacement — "We actually work alongside [their system] for cities that want to add plan review / code enforcement / public portal without replacing what they just implemented."`,
        `Position as an insurance option — "Implementations sometimes hit rough patches 6–12 months in. If that happens and you want a backup option in your pocket, I'm happy to be that call."`,
      ],
      fail:`Treating this the same as "locked in a contract" and accepting a 2-year callback — the complementary angle is often genuinely relevant and no rep uses it consistently.` },

    /* ---- 08 ---- */
    { num:'08', title:'Send Me an Email',
      freq:`~8–10% of substantive calls · a soft exit`,
      timing:`Any point — often 60–90 seconds in, when they want a polite out`,
      move:[
        `Accept partially — "Totally — I'll send that over."`,
        `Micro-commit before hanging up — "Just so I send the right thing and not a generic blast — are you mainly on [vendor] for permitting, or are you using it across inspections and code too?"`,
        `Plant a specific hook — "I'll include a one-pager on how [specific workflow] compares — most folks on [vendor] tell me that's the page that surprised them."`,
      ],
      insight:`"Send me an email" is almost always reflexive — the prospect wants the call to end pleasantly, not to actually read an email. The micro-commit re-engages without pressuring for a meeting.`,
      fail:`Accepting the email request immediately and asking "what's your email?" — the call ends, the email goes unread, and there's no established reason to follow up.` },

    /* ---- 09 ---- */
    { num:'09', title:'Already Evaluating / Chose Another Vendor',
      freq:`~5–8% of substantive calls`,
      timing:`Mid-to-late call`,
      move:[
        `Acknowledge without deflating — "That makes sense — a lot of cities go through a proper evaluation process."`,
        `Get intel on who they're evaluating — "Who are you looking at? Just curious where we'd fit in that conversation."`,
        `If already decided — plant for renewal: "If after three years you're not satisfied, I'd love to be the first call. Can I check back in when you're 6 months from renewal?"`,
        `If still evaluating — ask for a slot: "We're typically faster to implement and easier to price than what you're looking at — worth a 15-minute look before you finalize?"`,
      ] },
  ];
  /* ==================== END OBJECTIONS DATA ====================== */

  /* ---- Build tree: start -> objection -> (move / examples / insight / fail) ---- */
  let _id=0;
  const mk = p => Object.assign({id:'o'+(_id++),children:[],expanded:false},p);
  const root = mk({type:'start',expanded:true,accent:'#41AAEB'});
  OBJECTIONS.forEach(o=>{
    const on = mk({type:'objection',accent:'#8b3a3a',num:o.num,title:o.title,freq:o.freq,timing:o.timing});
    on.children.push(mk({type:'move',accent:'#39C25E',label:'Recommended move',steps:o.move}));
    (o.examples||[]).forEach(ex=>
      on.children.push(mk({type:'move',accent:'#39C25E',label:ex.who,text:ex.quote,outcome:ex.outcome||''})));
    if(o.insight) on.children.push(mk({type:'move',accent:'#39C25E',label:'Key insight',text:o.insight}));
    if(o.fail)    on.children.push(mk({type:'move',accent:'#FEAF0E',probe:true,label:'Failure mode',text:o.fail}));
    root.children.push(on);
  });
  addPlaceholders(root, mk);

  /* ---- DOM + constants ---- */
  const V=document.getElementById('viewportObj');
  const W=document.getElementById('worldObj');
  const C=document.getElementById('cardsObj');
  const S=document.getElementById('linksObj');
  const NS='http://www.w3.org/2000/svg';
  const CARD_W=272, COL_W=372, V_GAP=20;
  let tx=80, ty=0, scale=1, firstRun=true, rendered=false;
  const elMap=new Map();
  let refEl=null;

  function makeCard(n){
    const el=document.createElement('div');
    const kids=n.children.filter(c=>c.type!=='add').length;
    if(n.type==='start'){
      el.className='card start';
      el.innerHTML=`<div class="big">🛡️ Objection Handling</div>
        <div class="hint">Pick an objection →</div>`;
    } else if(n.type==='objection'){
      el.className='card objection'+(kids?' has':'');
      el.style.setProperty('--accent',n.accent);
      el.innerHTML=`
        <div class="top">
          <span class="num">${n.num}</span>
          <span class="title">${n.title}</span>
          ${kids?`<span class="pill">${n.expanded?'▾':'▸ '+kids}</span>`:''}
        </div>
        <div class="objfreq">${n.freq}</div>
        <div class="objtiming"><b>When:</b> ${n.timing}</div>`;
    } else if(n.type==='add'){
      el.className='card add';
      el.dataset.add=n.addlabel;
      el.innerHTML=`<div class="add-inner">+ ${n.addlabel}</div>`;
    } else { // move: handling steps, example, insight, or failure-mode probe
      el.className='card move'+(n.probe?' probe':'');
      el.style.setProperty('--accent',n.accent);
      let body;
      if(n.steps){ body='<ol>'+n.steps.map(s=>`<li>${s}</li>`).join('')+'</ol>'; }
      else { body=`<div class="body">${n.text}</div>`+(n.outcome?`<div class="exoutcome">↳ ${n.outcome}</div>`:''); }
      el.innerHTML=`<div class="top"><span class="label">${n.label}</span></div>${body}`;
    }
    el.addEventListener('click',()=>{
      if(!n.children.length) return;
      const sel=window.getSelection(); if(sel&&!sel.isCollapsed) return;
      n.expanded=!n.expanded; render();
    });
    return el;
  }

  /* Static master-principle reference card — not part of the node tree, never expands */
  function makeRef(){
    const el=document.createElement('div');
    el.className='card refcard';
    el.innerHTML=`
      <div class="top"><span class="label">⚖️ Master Principle</span></div>
      <div class="refbody">Test before you accept. Most objections are reflexive, not final.</div>
      <div class="refflow">Validate → probe the premise → specific question or reframe.</div>
      <div class="avoid"><b>Never</b> pitch features in response to an objection.</div>`;
    return el;
  }

  function drawLinks(){
    while(S.firstChild) S.removeChild(S.firstChild);
    (function walk(n){
      if(!n.expanded) return;
      n.children.forEach(c=>{
        const x1=n.x+CARD_W, y1=n.y+n.h/2, x2=c.x, y2=c.y+c.h/2, mx=(x1+x2)/2;
        const p=document.createElementNS(NS,'path');
        p.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        p.setAttribute('fill','none');
        p.setAttribute('stroke',c.accent);
        p.setAttribute('stroke-width','2');
        p.setAttribute('stroke-opacity','.55');
        S.appendChild(p);
        walk(c);
      });
    })(root);
  }

  function render(){
    rendered=true;
    C.innerHTML=''; elMap.clear();
    (function walk(n){ const el=makeCard(n); C.appendChild(el); elMap.set(n.id,el);
      if(n.expanded) n.children.forEach(walk); })(root);
    refEl=makeRef(); C.appendChild(refEl);

    const measure=n=>{ const el=elMap.get(n.id); n.h=el?el.offsetHeight:60; n.w=CARD_W;
      if(n.expanded) n.children.forEach(measure); };
    measure(root);
    const refH=refEl.offsetHeight;

    // layout — depth offset +1 so the reference card occupies column 0
    let cursor=0;
    (function place(n,depth){
      n.x=(depth+1)*COL_W;
      const kids=n.expanded?n.children:[];
      if(!kids.length){ n.y=cursor; cursor+=n.h+V_GAP; }
      else { kids.forEach(k=>place(k,depth+1));
        const f=kids[0], l=kids[kids.length-1];
        n.y=(f.y+f.h/2+l.y+l.h/2)/2 - n.h/2; }
    })(root,0);

    // normalize tree top to 0, then vertically center tree vs. reference card
    let minY=Infinity,maxX=0,maxYb=0;
    const scan=n=>{ minY=Math.min(minY,n.y); maxYb=Math.max(maxYb,n.y+n.h);
      maxX=Math.max(maxX,n.x+CARD_W); if(n.expanded) n.children.forEach(scan); };
    scan(root);
    const shift = -minY;
    const treeH = maxYb+shift;
    const totalH = Math.max(treeH, refH);
    const treeOff = shift + (totalH-treeH)/2;
    const apply=n=>{ n.y+=treeOff; if(n.expanded) n.children.forEach(apply); };
    apply(root);

    const pos=n=>{ const el=elMap.get(n.id); el.style.left=n.x+'px'; el.style.top=n.y+'px';
      if(n.expanded) n.children.forEach(pos); };
    pos(root);
    refEl.style.left='0px'; refEl.style.top=((totalH-refH)/2)+'px';

    S.setAttribute('width',maxX+40); S.setAttribute('height',totalH+40);
    S.style.width=(maxX+40)+'px'; S.style.height=(totalH+40)+'px';
    drawLinks();

    if(firstRun){ firstRun=false; ty=Math.max(20,(V.clientHeight-totalH)/2); applyTransform(); }
  }

  function applyTransform(){ W.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }

  /* ---- Pan ---- */
  let panning=false,sx=0,sy=0,stx=0,sty=0;
  V.addEventListener('mousedown',e=>{ if(e.target.closest('.card'))return;
    panning=true;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;V.classList.add('panning'); });
  window.addEventListener('mousemove',e=>{ if(!panning)return;
    tx=stx+(e.clientX-sx); ty=sty+(e.clientY-sy); applyTransform(); });
  window.addEventListener('mouseup',()=>{ panning=false; V.classList.remove('panning'); });

  /* ---- Zoom (proportional, dampened — matches opener) ---- */
  function zoomAt(f,cx,cy){ const ns=Math.min(1.7,Math.max(0.35,scale*f)); const k=ns/scale;
    tx=cx-(cx-tx)*k; ty=cy-(cy-ty)*k; scale=ns; applyTransform(); }
  V.addEventListener('wheel',e=>{ e.preventDefault(); const r=V.getBoundingClientRect();
    const d=Math.max(-60,Math.min(60,e.deltaY)); zoomAt(Math.exp(-d*0.0022),e.clientX-r.left,e.clientY-r.top);
  },{passive:false});

  /* ---- Controls ---- */
  document.getElementById('objExpandAll').onclick=()=>{
    (function w(n){ if(n.children.length)n.expanded=true; n.children.forEach(w); })(root);
    root.expanded=true; render(); };
  document.getElementById('objCollapseAll').onclick=()=>{
    (function w(n){ if(n.children.length)n.expanded=false; n.children.forEach(w); })(root);
    root.expanded=true; root.children.forEach(t=>t.expanded=false); render(); };
  document.getElementById('objZoomIn').onclick =()=>zoomAt(1.15, V.clientWidth/2, V.clientHeight/2);
  document.getElementById('objZoomOut').onclick=()=>zoomAt(1/1.15, V.clientWidth/2, V.clientHeight/2);
  document.getElementById('objReset').onclick  =()=>{ scale=1; tx=80; firstRun=true; render(); };

  // Render lazily on first view (heights must be measured while visible)
  return { ensure(){ if(!rendered) render(); } };
})();


/* ================================================================== */
/* ======================== CLOSING MODULE ========================= */
/* Independent engine — its own scope, DOM containers, and state.     */
/* Does not touch the opener, midgame, or objections engines above.   */
/* Two static reference cards: the Closing Formula sits at column 0;  */
/* "What Kills the Close" is anchored one column past the tree.       */
/* ================================================================== */
const Closing = (function(){

  /* =============================================================== */
  /* ==================== CLOSING DATA (edit here) ================= */
  /* TRACK 1 (The Ask): ask cards show frequency + conversion inline */
  /*   and expand into rep-attributed phrasings (green). A readiness */
  /*   probe (amber) leads the track. TRACK 2 (After the Ask):       */
  /*   scenario headers — red = soft-no handling, green = closing    */
  /*   action — expand into move steps + a key insight or failure.   */
  /* =============================================================== */

  // ---- Track 1: readiness gate ----
  const READINESS = {
    text:`The prospect is ready when they ask YOU a question about GovWell. When they ask about product, pricing, or process — that's the signal. Transition to the ask immediately and stop pitching once the signal is given.`,
    list:[
      `"Do you have a sense of how the cost compares to [vendor]?"`,
      `"What does that look like? How long is the meeting?"`,
      `"How much does your system cost?"`,
      `"Does your system do [specific capability]?"`,
    ]
  };

  // ---- Track 1: the four meeting asks ----
  const ASKS = [
    { num:'1', title:'15-Minute Intro Call',
      freq:`~60% of asks · dominant`, conv:`~40–50% booked`,
      whenLabel:`Why it works`,
      when:`Explicitly stating what WON'T happen ("not a demo right away") removes the prospect's biggest fear.`,
      phrasings:[
        { who:`Best-in-class`, quote:`"Typically what we do is set up a fifteen-minute introductory call. We're not gonna set you up with a demo right away or anything like that — we don't wanna waste anyone's time. In fifteen minutes we can show you a bit of the software, you can get a sense of if this seems interesting, and we'll give you a sense of the price. Would that work?"` },
        { who:`Best-in-class`, quote:`"To kinda see if we were a good fit, we'd do a fifteen, twenty-min intro call. Is that something you'd be able to set up?"` },
      ] },

    { num:'2', title:'Quote / Pricing Call',
      freq:`~15% of asks`, conv:`~55–65% booked`,
      whenLabel:`When`,
      when:`Any time they mention cost or budget, or ask "how much?" — frame the meeting around getting them a real number. Highest-converting ask in the dataset.`,
      phrasings:[
        { who:`Best-in-class`, quote:`"We can probably get you a number in fifteen to twenty minutes because our product has a couple different modules and it depends on volume. We usually set up a fifteen-min call with a product specialist and they'll be able to get you that number. Would you be open to that?"` },
        { who:`Best-in-class`, quote:`"Usually what we do is — to get an accurate quote, we do a fifteen-min call with the product expert, and they can understand your situation a little bit. And then from there they can help figure out if it makes sense to do a demo."` },
        { who:`Best-in-class`, quote:`"Would you be open to setting up fifteen minutes so we can even be upfront with you about a price quote?"` },
      ] },

    { num:'3', title:'Back-Pocket / Future Reference',
      freq:`~10% of asks`, conv:`~25–35% booked`,
      whenLabel:`When`,
      when:`Prospect is happy with their current system or not actively looking. Frames the meeting as preparation, not evaluation.`,
      phrasings:[
        { who:`Best-in-class`, quote:`"In the interim, if you're available for that short fifteen, twenty-min introductory call to kinda see if we would be a better fit — just to have in your back pocket when the time comes."` },
        { who:`Best-in-class`, quote:`"We'll set up a fifteen-min intro call with somebody on our product team who can give you that quote to know what that would look like — even if it's not right now, in the future."` },
      ] },

    { num:'4', title:'Budget-Planning',
      freq:`~8% of asks`, conv:`~50–60% booked`,
      whenLabel:`When`,
      when:`Prospect cited budget as the reason not to meet. Repositions the meeting from "evaluate now" to "prepare your budget request."`,
      phrasings:[
        { who:`Best-in-class → booked`, quote:`"With the budget concern, if it is something you're looking to implement, we sometimes work on an eighteen-month timeline so that people can prepare budgets down the line. That is a fifteen to twenty-minute call if that's of interest to you."` },
        { who:`Best-in-class`, quote:`"When going into the budgeting process, the people that have a directional sense of what they're looking for usually have a little bit of an edge getting what they want in those conversations."` },
      ] },
  ];

  // ---- Track 2: after-the-ask scenarios ----
  const SCENARIOS = [
    { tone:'handle', tag:'Soft no', title:`Handling "Send Me an Email First"`,
      moveLabel:`The move`,
      steps:[
        `Accept partially — "Totally, I'll send that over."`,
        `Micro-commit before hanging up — "Just so I send the right thing and not a generic blast — are you mainly on [vendor] for permitting, or using it across inspections and code too?"`,
        `Plant a hook — "I'll include a one-pager on how [specific workflow] compares. Most folks on [vendor] tell me that's the page that surprised them."`,
      ],
      fail:`Asking "what's your email?" immediately and ending the call — the email goes unread and there's no established reason to follow up.` },

    { tone:'handle', tag:'Soft no', title:`Handling "Not Right Now / Call Back Later"`,
      moveLabel:`The move`,
      steps:[
        `Get a specific date, not a season — "Is there a specific month that tends to be better — after budget season, after a project wraps?"`,
        `Make the callback conditional — "I'll reach out in [month]. Is there anything I can send in the meantime that would make that conversation more useful?"`,
        `Calendar placeholder attempt — "Maybe I'll find a hold time for now; if you're not interested you could always decline it."`,
      ],
      fail:`Generic "I'll call back in the fall" with no anchor date and no defined reason to reconnect.` },

    { tone:'do', tag:'On the yes', title:`Confirming a Booked Meeting`,
      moveLabel:`Before you hang up — do all of these`,
      steps:[
        `Confirm the time verbally — "So Friday at 2PM Central?"`,
        `Send the calendar invite while still on the phone.`,
        `Ask them to confirm receipt — "Would you mind taking a look to see if you got that invite?" (strongest no-show prevention in the dataset)`,
        `Name the AE — "It'll be with my colleague [Name]."`,
        `Set expectations — "They handle the pricing side and can walk you through how [specific workflow] works."`,
      ],
      insight:`Reps who confirm invite receipt live have significantly lower no-show rates. Reps who leave scheduling to a follow-up email almost never convert.` },

    { tone:'do', tag:'No meeting', title:`The Clean Exit (No Meeting Booked)`,
      moveLabel:`Best practice`,
      steps:[
        `Establish a specific callback date, not a vague timeframe.`,
        `Name the trigger — "I'll reach back out after your budget season wraps," or "I'll put a note for [specific month]."`,
        `Leave them one concrete data point — "I'll send you a one-pager on how [specific workflow] works, just so you have it when the timing's right."`,
      ],
      fail:`"I'll send you an email and we can go from there" with no date and no reason to reconnect — effectively lost pipeline.` },
  ];
  /* ===================== END CLOSING DATA ======================= */

  /* ---- Build tree: start -> 2 tracks -> children ---- */
  let _id=0;
  const mk = p => Object.assign({id:'c'+(_id++),children:[],expanded:false},p);
  const root = mk({type:'start',expanded:true,accent:'#41AAEB'});

  const t1 = mk({type:'track',accent:'#41AAEB',num:'T1',title:'The Ask',
                 subtitle:'How to frame and deliver the meeting request.'});
  t1.children.push(mk({type:'move',probe:true,accent:'#FEAF0E',
    label:'Readiness signals — when to pull the trigger', text:READINESS.text, list:READINESS.list}));
  ASKS.forEach(a=>{
    const an = mk({type:'ask',accent:'#41AAEB',num:a.num,title:a.title,
                   freq:a.freq,conv:a.conv,whenLabel:a.whenLabel,when:a.when});
    a.phrasings.forEach(p=> an.children.push(mk({type:'move',accent:'#39C25E',label:p.who,text:p.quote})));
    t1.children.push(an);
  });
  root.children.push(t1);

  const t2 = mk({type:'track',accent:'#f0883e',num:'T2',title:'After the Ask',
                 subtitle:'Handle soft nos, confirm bookings, exit cleanly.'});
  SCENARIOS.forEach(s=>{
    const sn = mk({type:'scenario',tone:s.tone,tag:s.tag,title:s.title,
                   accent:s.tone==='handle'?'#8b3a3a':'#39C25E'});
    sn.children.push(mk({type:'move',accent:'#39C25E',label:s.moveLabel,steps:s.steps}));
    if(s.insight) sn.children.push(mk({type:'move',accent:'#39C25E',label:'Key insight',text:s.insight}));
    if(s.fail)    sn.children.push(mk({type:'move',probe:true,accent:'#FEAF0E',label:'Failure mode',text:s.fail}));
    t2.children.push(sn);
  });
  root.children.push(t2);
  addPlaceholders(root, mk);

  /* ---- DOM + constants ---- */
  const V=document.getElementById('viewportClose');
  const W=document.getElementById('worldClose');
  const C=document.getElementById('cardsClose');
  const S=document.getElementById('linksClose');
  const NS='http://www.w3.org/2000/svg';
  const CARD_W=272, COL_W=372, V_GAP=20;
  let tx=80, ty=0, scale=1, firstRun=true, rendered=false;
  const elMap=new Map();

  function makeCard(n){
    const el=document.createElement('div');
    const kids=n.children.filter(c=>c.type!=='add').length;
    const pill = kids?`<span class="pill">${n.expanded?'▾':'▸ '+kids}</span>`:'';
    if(n.type==='start'){
      el.className='card start';
      el.innerHTML=`<div class="big">✅ Closing</div><div class="hint">Pick a track →</div>`;
    } else if(n.type==='track'){
      el.className='card track'+(kids?' has':'');
      el.style.setProperty('--accent',n.accent);
      el.innerHTML=`
        <div class="top"><span class="num">${n.num}</span><span class="title">${n.title}</span>${pill}</div>
        <div class="usewhen">${n.subtitle}</div>`;
    } else if(n.type==='ask'){
      el.className='card ask'+(kids?' has':'');
      el.style.setProperty('--accent',n.accent);
      el.innerHTML=`
        <div class="top"><span class="num">${n.num}</span><span class="title">${n.title}</span>${pill}</div>
        <div class="askmeta"><span class="freqchip">${n.freq}</span><span class="convchip">${n.conv}</span></div>
        <div class="asknote"><b>${n.whenLabel}:</b> ${n.when}</div>`;
    } else if(n.type==='scenario'){
      el.className='card scenario '+n.tone+(kids?' has':'');
      el.style.setProperty('--accent',n.accent);
      el.innerHTML=`
        <div class="top"><span class="label">${n.tag}</span>${pill}</div>
        <div class="scentitle">${n.title}</div>`;
    } else if(n.type==='add'){
      el.className='card add';
      el.dataset.add=n.addlabel;
      el.innerHTML=`<div class="add-inner">+ ${n.addlabel}</div>`;
    } else { // move: steps, phrasing/text, readiness list, insight, or failure probe
      el.className='card move'+(n.probe?' probe':'');
      el.style.setProperty('--accent',n.accent);
      let body;
      if(n.steps){ body='<ol>'+n.steps.map(s=>`<li>${s}</li>`).join('')+'</ol>'; }
      else { body=`<div class="body">${n.text||''}</div>`;
        if(n.list) body+='<ul class="qlist">'+n.list.map(li=>`<li>${li}</li>`).join('')+'</ul>';
        if(n.outcome) body+=`<div class="exoutcome">↳ ${n.outcome}</div>`; }
      el.innerHTML=`<div class="top"><span class="label">${n.label}</span></div>${body}`;
    }
    el.addEventListener('click',()=>{
      if(!n.children.length) return;
      const sel=window.getSelection(); if(sel&&!sel.isCollapsed) return;
      n.expanded=!n.expanded; render();
    });
    return el;
  }

  /* Static reference card: the closing formula (column 0) */
  function makeFormula(){
    const el=document.createElement('div');
    el.className='card refcard';
    el.innerHTML=`
      <div class="top"><span class="label">🎯 The Closing Formula</span></div>
      <div class="refsub">Highest conversion rate in the dataset</div>
      <div class="refflow">[Pain acknowledgment] → [Transparency about your role] → [Upgrade to expert] → [Specific time] → [Direct question]</div>
      <div class="refbody">"It sounds like [specific pain]. I'm not the product expert, but the person I'd connect you with specializes in [their workflow] and can show you exactly how that works — plus give you a sense of pricing. We can do that in fifteen minutes. Would [specific day] work?"</div>
      <div class="refrules"><b>Core rules</b>
        <ul>
          <li>Never ask before establishing pain.</li>
          <li>Never pitch features before asking — you eliminate their reason to attend.</li>
          <li>"Fifteen minutes" is the magic number — use it every time.</li>
          <li>Move to scheduling immediately on any yes — meetings booked on the call show up; "follow up to schedule" don't.</li>
          <li>Always name the AE who will be on the call.</li>
        </ul>
      </div>`;
    return el;
  }

  /* Static reference card: what kills the close (anchored at the far right) */
  function makeKills(){
    const el=document.createElement('div');
    el.className='card refcard';
    el.innerHTML=`
      <div class="top"><span class="label">⛔ What Kills the Close</span></div>
      <ol>
        <li><b>Asking before pain is established</b> — prospect has no reason to say yes.</li>
        <li><b>Pitching features instead of asking</b> — eliminates their reason to attend.</li>
        <li><b>Tentative language</b> — "would you maybe possibly want to..." signals the rep doesn't believe the meeting is worth their time.</li>
        <li><b>Never asking at all</b> — calls that end with "I'll send an email" never convert.</li>
        <li><b>Leaving scheduling to a follow-up</b> — if it's not on the calendar before you hang up, it probably won't be.</li>
      </ol>`;
    return el;
  }

  function drawLinks(){
    while(S.firstChild) S.removeChild(S.firstChild);
    (function walk(n){
      if(!n.expanded) return;
      n.children.forEach(c=>{
        const x1=n.x+CARD_W, y1=n.y+n.h/2, x2=c.x, y2=c.y+c.h/2, mx=(x1+x2)/2;
        const p=document.createElementNS(NS,'path');
        p.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        p.setAttribute('fill','none');
        p.setAttribute('stroke',c.accent);
        p.setAttribute('stroke-width','2');
        p.setAttribute('stroke-opacity','.55');
        S.appendChild(p);
        walk(c);
      });
    })(root);
  }

  function render(){
    rendered=true;
    C.innerHTML=''; elMap.clear();
    (function walk(n){ const el=makeCard(n); C.appendChild(el); elMap.set(n.id,el);
      if(n.expanded) n.children.forEach(walk); })(root);
    const formulaEl=makeFormula(); C.appendChild(formulaEl);
    const killsEl=makeKills();     C.appendChild(killsEl);

    const measure=n=>{ const el=elMap.get(n.id); n.h=el?el.offsetHeight:60; n.w=CARD_W;
      if(n.expanded) n.children.forEach(measure); };
    measure(root);
    const formulaH=formulaEl.offsetHeight, killsH=killsEl.offsetHeight;

    // layout — depth offset +1 so the formula card occupies column 0
    let cursor=0;
    (function place(n,depth){
      n.x=(depth+1)*COL_W;
      const kids=n.expanded?n.children:[];
      if(!kids.length){ n.y=cursor; cursor+=n.h+V_GAP; }
      else { kids.forEach(k=>place(k,depth+1));
        const f=kids[0], l=kids[kids.length-1];
        n.y=(f.y+f.h/2+l.y+l.h/2)/2 - n.h/2; }
    })(root,0);

    // normalize tree top to 0, then vertically center tree vs. both static cards
    let minY=Infinity,maxNodeX=0,maxYb=0;
    const scan=n=>{ minY=Math.min(minY,n.y); maxYb=Math.max(maxYb,n.y+n.h);
      maxNodeX=Math.max(maxNodeX,n.x); if(n.expanded) n.children.forEach(scan); };
    scan(root);
    const shift=-minY;
    const treeH=maxYb+shift;
    const totalH=Math.max(treeH,formulaH,killsH);
    const treeOff=shift+(totalH-treeH)/2;
    const apply=n=>{ n.y+=treeOff; if(n.expanded) n.children.forEach(apply); };
    apply(root);

    const pos=n=>{ const el=elMap.get(n.id); el.style.left=n.x+'px'; el.style.top=n.y+'px';
      if(n.expanded) n.children.forEach(pos); };
    pos(root);

    // formula at column 0; "what kills the close" one column past the rightmost node
    formulaEl.style.left='0px'; formulaEl.style.top=((totalH-formulaH)/2)+'px';
    const endX=maxNodeX+COL_W;
    killsEl.style.left=endX+'px'; killsEl.style.top=((totalH-killsH)/2)+'px';

    const finalMaxX=endX+CARD_W;
    S.setAttribute('width',finalMaxX+40); S.setAttribute('height',totalH+40);
    S.style.width=(finalMaxX+40)+'px'; S.style.height=(totalH+40)+'px';
    drawLinks();

    if(firstRun){ firstRun=false; ty=Math.max(20,(V.clientHeight-totalH)/2); applyTransform(); }
  }

  function applyTransform(){ W.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }

  /* ---- Pan ---- */
  let panning=false,sx=0,sy=0,stx=0,sty=0;
  V.addEventListener('mousedown',e=>{ if(e.target.closest('.card'))return;
    panning=true;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;V.classList.add('panning'); });
  window.addEventListener('mousemove',e=>{ if(!panning)return;
    tx=stx+(e.clientX-sx); ty=sty+(e.clientY-sy); applyTransform(); });
  window.addEventListener('mouseup',()=>{ panning=false; V.classList.remove('panning'); });

  /* ---- Zoom (proportional, dampened — matches opener) ---- */
  function zoomAt(f,cx,cy){ const ns=Math.min(1.7,Math.max(0.35,scale*f)); const k=ns/scale;
    tx=cx-(cx-tx)*k; ty=cy-(cy-ty)*k; scale=ns; applyTransform(); }
  V.addEventListener('wheel',e=>{ e.preventDefault(); const r=V.getBoundingClientRect();
    const d=Math.max(-60,Math.min(60,e.deltaY)); zoomAt(Math.exp(-d*0.0022),e.clientX-r.left,e.clientY-r.top);
  },{passive:false});

  /* ---- Controls ---- */
  document.getElementById('closeExpandAll').onclick=()=>{
    (function w(n){ if(n.children.length)n.expanded=true; n.children.forEach(w); })(root);
    root.expanded=true; render(); };
  document.getElementById('closeCollapseAll').onclick=()=>{
    (function w(n){ if(n.children.length)n.expanded=false; n.children.forEach(w); })(root);
    root.expanded=true; root.children.forEach(t=>t.expanded=false); render(); };
  document.getElementById('closeZoomIn').onclick =()=>zoomAt(1.15, V.clientWidth/2, V.clientHeight/2);
  document.getElementById('closeZoomOut').onclick=()=>zoomAt(1/1.15, V.clientWidth/2, V.clientHeight/2);
  document.getElementById('closeReset').onclick  =()=>{ scale=1; tx=80; firstRun=true; render(); };

  // Render lazily on first view (heights must be measured while visible)
  return { ensure(){ if(!rendered) render(); } };
})();


/* ============================== TABS ============================== */
(function(){
  // Each tab: button, its canvas, its control group, and an optional
  // lazy-render hook (modules render on first view, while visible).
  const tabs = [
    { btn:'tabOpener', vp:'viewport',      ctl:'ctlsOpener', ensure:null },
    { btn:'tabMid',    vp:'viewportMid',   ctl:'ctlsMid',    ensure:()=>Midgame.ensure() },
    { btn:'tabObj',    vp:'viewportObj',   ctl:'ctlsObj',    ensure:()=>Objections.ensure() },
    { btn:'tabClose',  vp:'viewportClose', ctl:'ctlsClose',  ensure:()=>Closing.ensure() },
  ].map(t=>({ ...t,
    btnEl:document.getElementById(t.btn),
    vpEl :document.getElementById(t.vp),
    ctlEl:document.getElementById(t.ctl) }));

  function activate(active){
    tabs.forEach(t=>{
      const on = (t===active);
      t.btnEl.classList.toggle('active', on);
      t.vpEl.style.display  = on ? '' : 'none';
      t.ctlEl.style.display = on ? '' : 'none';
    });
    if(active.ensure) active.ensure();
  }
  tabs.forEach(t=> t.btnEl.onclick=()=>activate(t));
})();


/* ================================================================== */
/* ======================== FEEDBACK MODULE ======================== */
/* Lets reps click any card and leave an edit/suggestion/comment.     */
/* Submissions POST to a Google Sheet via an Apps Script web app.     */
/* Hooks onto cards via a DOM observer — no changes to module render. */
/* ================================================================== */
(function(){

  /* ⬇⬇⬇  PASTE your Google Apps Script Web App URL between the quotes  ⬇⬇⬇ */
  /*       (looks like https://script.google.com/macros/s/AKfy...../exec )   */
  const FEEDBACK_ENDPOINT = "https://script.google.com/macros/s/AKfycby_PVyWyxaZpaLUlYRqb4wDrsXoQg31M4uBnw7R01QHna7KaANrwQa8bbQNjGz0sKfjfw/exec";
  /* ⬆⬆⬆  Until this is set, feedback is saved to the rep's browser only.   ⬆⬆⬆ */

  const TAB_BY_CONTAINER = { cards:'Opener', cardsMid:'Midgame', cardsObj:'Objections', cardsClose:'Closing' };
  const CHAT = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.38 8.38 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>';

  /* ---- modal + toast (injected once) ---- */
  document.body.insertAdjacentHTML('beforeend', `
    <div class="fb-overlay" id="fbOverlay" hidden>
      <div class="fb-modal">
        <div class="fb-head" id="fbHead">Leave a comment</div>
        <div class="fb-ctx" id="fbCtx"></div>
        <textarea id="fbText" placeholder="Share a comment, edit, or suggestion. Be specific."></textarea>
        <input id="fbRep" placeholder="Your name" />
        <div class="fb-actions">
          <button type="button" id="fbCancel" class="fb-btn-ghost">Cancel</button>
          <button type="button" id="fbSend" class="fb-btn-primary">Send feedback</button>
        </div>
        <div class="fb-note" id="fbNote"></div>
      </div>
    </div>
    <div class="fb-toast" id="fbToast"></div>
  `);

  const overlay=document.getElementById('fbOverlay');
  const headEl=document.getElementById('fbHead');
  const ctxEl=document.getElementById('fbCtx');
  const textEl=document.getElementById('fbText');
  const repEl=document.getElementById('fbRep');
  const noteEl=document.getElementById('fbNote');
  const toast=document.getElementById('fbToast');
  let cur={tab:'',card:''}, type='Comment';

  repEl.value = localStorage.getItem('gw_fb_rep') || '';

  // mode: 'comment' (from a card's 💬) or 'add' (from a "+ Add a block" card)
  function open(ctx){
    cur=ctx;
    const isAdd = ctx.mode==='add';
    type = isAdd ? 'New block' : 'Comment';
    headEl.textContent = isAdd ? 'Propose a new block' : 'Leave a comment';
    textEl.placeholder = isAdd
      ? "Describe the new block you'd like to add — and what it should say."
      : 'Share a comment, edit, or suggestion. Be specific.';
    ctxEl.textContent = ctx.tab + (ctx.card?'  ·  '+ctx.card:'');
    textEl.value=''; noteEl.textContent=''; overlay.hidden=false; setTimeout(()=>textEl.focus(),30);
  }
  function close(){ overlay.hidden=true; }

  document.getElementById('fbCancel').onclick=close;
  overlay.addEventListener('click',e=>{ if(e.target===overlay) close(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&!overlay.hidden) close(); });

  function showToast(msg){ toast.textContent=msg; toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2400); }

  document.getElementById('fbSend').onclick=async ()=>{
    const suggestion=textEl.value.trim();
    if(!suggestion){ noteEl.textContent='Please type your feedback first.'; textEl.focus(); return; }
    const rep=repEl.value.trim();
    localStorage.setItem('gw_fb_rep', rep);
    const payload={ ts:new Date().toISOString(), rep, tab:cur.tab, card:cur.card, type, suggestion };
    // mirror locally so the rep keeps a record of what they submitted
    try{ const log=JSON.parse(localStorage.getItem('gw_fb_log')||'[]'); log.push(payload);
      localStorage.setItem('gw_fb_log', JSON.stringify(log)); }catch(_){}
    if(FEEDBACK_ENDPOINT){
      try{ await fetch(FEEDBACK_ENDPOINT,{method:'POST',mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)}); }
      catch(_){ /* no-cors is fire-and-forget; ignore opaque/network result */ }
      showToast('✓ Feedback sent — thank you!');
    } else {
      showToast('✓ Saved locally (endpoint not set yet)');
    }
    close();
  };

  /* ---- decorate every card with a feedback button (observer = no render edits) ---- */
  function deriveLabel(card){
    const num=card.querySelector('.num');
    const t=card.querySelector('.title, .scentitle');
    if(t) return (num?num.textContent.trim()+' ':'')+t.textContent.trim();
    const big=card.querySelector('.big'); if(big) return big.textContent.trim();
    const lab=card.querySelector('.label'); if(lab) return lab.textContent.trim();
    return 'Card';
  }
  function decorate(){
    document.querySelectorAll('#cards .card, #cardsMid .card, #cardsObj .card, #cardsClose .card').forEach(card=>{
      if(card.classList.contains('start')) return;     // skip navigation-only cards
      if(card.classList.contains('add')) return;        // ghost "add a block" cards click themselves
      if(card.querySelector('.fbbtn')) return;
      const btn=document.createElement('button'); btn.type='button'; btn.className='fbbtn';
      btn.title='Suggest an edit or leave a comment'; btn.innerHTML=CHAT;
      (card.querySelector(':scope > .top') || card).appendChild(btn);
      card.dataset.fb=deriveLabel(card);
    });
  }
  ['cards','cardsMid','cardsObj','cardsClose'].forEach(id=>{
    const c=document.getElementById(id);
    if(c) new MutationObserver(decorate).observe(c,{childList:true});
  });
  decorate();

  // capture phase so feedback clicks never trigger a card expand/collapse
  const tabOf = el => TAB_BY_CONTAINER[(el.closest('#cards,#cardsMid,#cardsObj,#cardsClose')||{}).id]||'';
  document.addEventListener('click',e=>{
    // "+ Add a block" ghost card → propose-a-new-block composer
    const addCard=e.target.closest('.card.add');
    if(addCard){
      e.stopPropagation(); e.preventDefault();
      open({ tab: tabOf(addCard), card: addCard.dataset.add||'New block', mode:'add' });
      return;
    }
    // per-card 💬 button → comment composer
    const b=e.target.closest('.fbbtn');
    if(!b) return;
    e.stopPropagation(); e.preventDefault();
    const card=b.closest('.card');
    open({ tab: tabOf(b), card:(card&&card.dataset.fb)||'', mode:'comment' });
  }, true);
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GovWell · BD Cold Call Tree</title>
<style>
  :root{
    /* GovWell brand neutrals — Jet Black / Slate / Concrete / Cement / Base */
    --bg:#0c0c0d;        /* near Jet Black */
    --card:#161617;      /* Slate-ish surface */
    --card-2:#1f1f21;
    --line:#2d2d30;
    --text:#ECECEC;      /* Base */
    --muted:#7C7C7C;     /* Concrete */
    --soft:#B1B1B1;      /* Cement */
    --probe:#FEAF0E;     /* Hope — brand hero accent */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);
    /* GT Standard is the brand typeface; fall back to a neo-grotesque stack */
    font-family:'GT Standard','Helvetica Neue',Helvetica,Arial,sans-serif;
    color:var(--text);}

  /* ---- Toolbar ---- */
  #bar{position:fixed;top:0;left:0;right:0;height:54px;z-index:100;
    display:flex;align-items:center;gap:14px;padding:0 18px;
    background:#121214;
    border-bottom:1px solid var(--line);}
  #bar .brand{display:flex;align-items:center;font-weight:700;letter-spacing:.2px;font-size:15px;}
  #bar .brand .wm{color:#fff;}
  #bar .brand .flagmark{margin:0 9px 0 7px;display:inline-flex;}
  #bar .brand .bsep{color:var(--muted);font-weight:400;margin-right:7px;}
  #bar .brand .btag{color:var(--muted);font-weight:600;}
  #bar .sub{color:var(--muted);font-size:12px;}
  #bar .spacer{flex:1;}
  .btn{background:var(--card-2);border:1px solid var(--line);color:var(--soft);
    font-size:12px;font-weight:600;padding:7px 11px;border-radius:7px;cursor:pointer;
    transition:.12s;white-space:nowrap;}
  .btn:hover{background:#2a2a2d;color:#fff;border-color:#3d3d40;}
  .btn.icon{padding:7px 10px;min-width:34px;text-align:center;}

  /* ---- Canvas ---- */
  #viewport{position:absolute;inset:54px 0 0 0;overflow:hidden;cursor:grab;
    background-color:var(--bg);
    background-image:radial-gradient(rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:26px 26px;}
  #viewport.panning{cursor:grabbing;}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;}
  #links{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
  #cards{position:absolute;top:0;left:0;}

  /* ---- Cards ---- */
  .card{position:absolute;width:272px;background:var(--card);
    border:1px solid var(--line);border-left:4px solid var(--accent,#475160);
    border-radius:11px;padding:12px 14px;cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.35);transition:border-color .12s,box-shadow .12s,transform .12s;
    user-select:text;}
  .card:hover{box-shadow:0 8px 24px rgba(0,0,0,.5);transform:translateY(-1px);}
  .card .top{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .card .label{font-size:10.5px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;
    color:var(--accent,#7d8794);}
  .card .num{font-size:10.5px;font-weight:800;color:#fff;background:var(--accent,#475160);
    border-radius:5px;padding:2px 6px;letter-spacing:.5px;}
  .card .title{font-size:14px;font-weight:700;color:#fff;}
  .card .pill{margin-left:auto;font-size:11px;font-weight:700;color:var(--muted);
    background:var(--card-2);border:1px solid var(--line);border-radius:20px;
    padding:2px 9px;white-space:nowrap;}
  .card.has:hover .pill{color:#fff;border-color:var(--accent,#3a4450);}
  .card .usewhen{font-size:11.5px;color:var(--muted);font-style:italic;margin-bottom:8px;
    line-height:1.4;}
  .card .body{font-size:12.5px;line-height:1.5;color:var(--soft);}
  .card .body.script{color:#dbe4ee;}

  /* node-type tints */
  .card.start{width:200px;text-align:center;background:#11202e;border-color:#1f3a52;border-left-color:#41AAEB;}
  .card.start .big{font-size:15px;font-weight:800;color:#fff;}
  .card.start .hint{font-size:11px;color:var(--muted);margin-top:4px;}
  .card.response{background:var(--card-2);}
  .card.move .label{color:#39C25E;}
  .card.move.probe{border-left-style:dashed;}
  .card.move.probe .label{color:var(--probe);}

  .legend{position:fixed;bottom:14px;left:18px;z-index:15;font-size:11.5px;color:var(--muted);
    background:#121214;border:1px solid var(--line);border-radius:8px;padding:7px 11px;}
  .legend b{color:var(--soft);font-weight:600;}

  /* ===================== MIDGAME ADDITIONS ===================== */
  /* ---- Tabs (match header) ---- */
  #bar .tabs{display:flex;gap:4px;}
  .tab{background:transparent;border:1px solid transparent;color:var(--muted);
    font-size:13px;font-weight:600;padding:7px 14px;border-radius:7px;cursor:pointer;
    font-family:inherit;transition:.12s;}
  .tab:hover{color:var(--soft);background:var(--card-2);}
  .tab.active{color:#fff;background:var(--card-2);border-color:var(--line);}
  .ctls{display:flex;align-items:center;gap:14px;}

  /* ---- Midgame canvas (mirrors #viewport) ---- */
  #viewportMid{position:absolute;inset:54px 0 0 0;overflow:hidden;cursor:grab;
    background-color:var(--bg);
    background-image:radial-gradient(rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:26px 26px;}
  #viewportMid.panning{cursor:grabbing;}
  #worldMid{position:absolute;top:0;left:0;transform-origin:0 0;}
  #linksMid{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
  #cardsMid{position:absolute;top:0;left:0;}

  /* ---- Midgame question cards ---- */
  .card.qcard .label{color:var(--accent,#41AAEB);font-size:13px;letter-spacing:.3px;
    text-transform:none;font-weight:800;}
  .card.qcard .flag{margin-left:auto;font-size:9.5px;font-weight:800;letter-spacing:.6px;
    color:#0d1117;background:var(--probe);border-radius:20px;padding:3px 8px;text-transform:uppercase;}
  .qsay{font-size:12.5px;line-height:1.5;color:#dbe4ee;margin-bottom:8px;
    padding-left:10px;border-left:2px solid var(--accent,#39C25E);}
  .qsay:last-of-type{margin-bottom:0;}
  .qhint{display:block;margin-top:3px;font-size:11px;color:var(--muted);font-style:italic;}
  .qnote{font-size:11.5px;color:var(--muted);font-style:italic;line-height:1.45;
    margin-top:9px;border-top:1px solid var(--line);padding-top:8px;}

  /* ---- Midgame sequencing reference card (static, does NOT expand) ---- */
  .card.refcard{width:300px;cursor:default;background:#1b1810;
    border:1px dashed var(--probe);border-left:4px solid var(--probe);}
  .card.refcard:hover{transform:none;box-shadow:0 6px 18px rgba(0,0,0,.35);}
  .card.refcard .label{color:var(--probe);}
  .card.refcard ol{margin:4px 0 0;padding-left:20px;}
  .card.refcard li{font-size:12px;line-height:1.65;color:var(--soft);}
  .card.refcard .dim{color:var(--muted);}
  .card.refcard .avoid{margin-top:10px;font-size:11.5px;color:var(--muted);
    border-top:1px solid var(--line);padding-top:8px;}
  .card.refcard .avoid b{color:var(--probe);}

  /* ===================== OBJECTIONS ADDITIONS ===================== */
  /* ---- Objections canvas (mirrors #viewport) ---- */
  #viewportObj{position:absolute;inset:54px 0 0 0;overflow:hidden;cursor:grab;
    background-color:var(--bg);
    background-image:radial-gradient(rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:26px 26px;}
  #viewportObj.panning{cursor:grabbing;}
  #worldObj{position:absolute;top:0;left:0;transform-origin:0 0;}
  #linksObj{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
  #cardsObj{position:absolute;top:0;left:0;}

  /* ---- Objection nodes (muted red — "handle with care") ---- */
  .card.objection{background:#1a0f0f;border-color:#8b3a3a;border-left-color:#8b3a3a;}
  .card.objection .num{background:#8b3a3a;}
  .card.objection .title{color:#fff;}
  .objfreq{font-size:11px;font-weight:700;color:#e08a8a;margin-bottom:6px;letter-spacing:.2px;}
  .objtiming{font-size:11.5px;color:var(--muted);font-style:italic;line-height:1.4;}
  .objtiming b{color:var(--soft);font-style:normal;font-weight:600;}

  /* ---- Numbered handling steps + example outcomes inside move cards ---- */
  .card.move ol{margin:4px 0 0;padding-left:18px;}
  .card.move li{font-size:12px;line-height:1.55;color:var(--soft);margin-bottom:5px;}
  .card.move li:last-child{margin-bottom:0;}
  .exoutcome{margin-top:7px;font-size:11.5px;color:var(--muted);font-style:italic;line-height:1.4;}

  /* ---- Objections master-principle reference card ---- */
  .card.refcard .refbody{font-size:12.5px;line-height:1.55;color:var(--soft);margin-top:2px;}
  .card.refcard .refflow{margin-top:8px;font-size:12px;font-weight:700;color:var(--probe);line-height:1.5;}

  /* ===================== CLOSING ADDITIONS ===================== */
  /* ---- Closing canvas (mirrors #viewport) ---- */
  #viewportClose{position:absolute;inset:54px 0 0 0;overflow:hidden;cursor:grab;
    background-color:var(--bg);
    background-image:radial-gradient(rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:26px 26px;}
  #viewportClose.panning{cursor:grabbing;}
  #worldClose{position:absolute;top:0;left:0;transform-origin:0 0;}
  #linksClose{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
  #cardsClose{position:absolute;top:0;left:0;}

  /* ---- Track 1 "ask" cards (frequency + conversion shown inline) ---- */
  .card.ask .num{background:var(--accent,#41AAEB);}
  .askmeta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px;}
  .freqchip{font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--muted);
    background:var(--card-2);border:1px solid var(--line);border-radius:20px;padding:2px 8px;}
  .convchip{font-size:10px;font-weight:800;letter-spacing:.3px;color:#0d1117;
    background:#39C25E;border-radius:20px;padding:2px 8px;}
  .asknote{font-size:11.5px;color:var(--muted);font-style:italic;line-height:1.4;}
  .asknote b{color:var(--soft);font-style:normal;font-weight:600;}

  /* ---- Track 2 "scenario" header cards (red = soft-no handling, green = closing action) ---- */
  .card.scenario .label{font-size:10px;}
  .card.scenario .scentitle{font-size:14px;font-weight:700;color:#fff;margin-top:4px;line-height:1.3;}
  .card.scenario.handle{background:#1a0f0f;border-color:#8b3a3a;border-left-color:#8b3a3a;}
  .card.scenario.handle .label{color:#e08a8a;}
  .card.scenario.do .label{color:#39C25E;}

  /* ---- Bulleted lists inside move cards (readiness signals) ---- */
  .qlist{margin:6px 0 0;padding-left:18px;}
  .qlist li{font-size:12px;line-height:1.5;color:var(--soft);margin-bottom:4px;}
  .qlist li:last-child{margin-bottom:0;}

  /* ---- Closing reference cards (formula + "what kills the close") ---- */
  .card.refcard .refsub{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:7px;}
  .card.refcard .refrules{margin-top:9px;border-top:1px solid var(--line);padding-top:8px;}
  .card.refcard .refrules>b{font-size:11px;color:var(--probe);text-transform:uppercase;letter-spacing:.5px;}
  .card.refcard .refrules ul{margin:5px 0 0;padding-left:18px;}
  .card.refcard .refrules li{font-size:11.5px;line-height:1.5;color:var(--soft);margin-bottom:5px;}
  .card.refcard .refrules li:last-child{margin-bottom:0;}

  /* ===================== FEEDBACK ADDITIONS ===================== */
  /* Per-card feedback button (injected onto every card via a DOM observer) */
  .fbbtn{margin-left:auto;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    background:transparent;border:1px solid var(--line);color:var(--muted);
    border-radius:6px;padding:2px 5px;cursor:pointer;opacity:.4;transition:.12s;}
  .card:hover .fbbtn{opacity:1;}
  .fbbtn:hover{border-color:var(--probe);color:var(--probe);}
  .fbbtn svg{display:block;}

  /* Composer modal */
  .fb-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.62);
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .fb-overlay[hidden]{display:none;}
  .fb-modal{width:440px;max-width:100%;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:20px;box-shadow:0 24px 60px rgba(0,0,0,.6);}
  .fb-head{font-size:15px;font-weight:700;color:#fff;}
  .fb-ctx{margin-top:6px;font-size:12px;color:var(--probe);font-weight:600;}
  /* Ghost "add a block" cards — propose a new block at the end of a series */
  .card.add{border:1.5px dashed var(--line);background:transparent;box-shadow:none;
    color:var(--muted);display:flex;align-items:center;justify-content:center;
    min-height:46px;font-size:12.5px;font-weight:600;text-align:center;}
  .card.add:hover{border-color:var(--probe);color:var(--probe);box-shadow:none;transform:translateY(-1px);}
  .card.add .add-inner{padding:6px 10px;}
  .fb-modal textarea{width:100%;min-height:96px;resize:vertical;background:var(--bg);
    border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:inherit;
    font-size:13px;line-height:1.5;padding:10px;}
  .fb-modal input{width:100%;margin-top:10px;background:var(--bg);border:1px solid var(--line);
    border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:9px 10px;}
  .fb-modal textarea:focus,.fb-modal input:focus{outline:none;border-color:var(--probe);}
  .fb-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
  .fb-btn-ghost{background:transparent;border:1px solid var(--line);color:var(--soft);
    font-weight:600;font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .fb-btn-ghost:hover{color:#fff;border-color:#3d3d40;}
  .fb-btn-primary{background:var(--probe);border:1px solid var(--probe);color:#161617;
    font-weight:700;font-size:13px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;}
  .fb-btn-primary:hover{filter:brightness(1.06);}
  .fb-note{margin-top:10px;font-size:11.5px;color:var(--muted);min-height:14px;}
  .fb-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:320;
    background:#39C25E;color:#08210f;font-weight:700;font-size:13px;padding:10px 18px;border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s;}
  .fb-toast.show{opacity:1;}
</style>
</head>
<body>
  <div id="bar">
    <div class="brand">
      <span class="wm">GovWell</span>
      <span class="flagmark" aria-hidden="true">
        <svg width="22" height="17" viewBox="0 0 28 22" fill="none">
          <rect x="1" y="12.5" width="6.5" height="7.5" fill="#FEAF0E"/>
          <polygon points="9,1.5 16.5,3.8 24.5,1.5 24.5,8.5 16.5,10.8 9,8.5" fill="#FEAF0E"/>
        </svg>
      </span>
      <span class="bsep">·</span><span class="btag">Cold Call Tree</span>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabOpener">Opener</button>
      <button class="tab" id="tabMid">Midgame</button>
      <button class="tab" id="tabObj">Objections</button>
      <button class="tab" id="tabClose">Closing</button>
    </div>
    <div class="spacer"></div>
    <!-- Opener controls (existing) -->
    <div class="ctls" id="ctlsOpener">
      <button class="btn" id="expandAll">Expand all</button>
      <button class="btn" id="collapseAll">Collapse all</button>
      <button class="btn icon" id="zoomOut">&minus;</button>
      <button class="btn icon" id="zoomIn">&plus;</button>
      <button class="btn" id="reset">Reset view</button>
    </div>
    <!-- Midgame controls -->
    <div class="ctls" id="ctlsMid" style="display:none">
      <button class="btn" id="midExpandAll">Expand all</button>
      <button class="btn" id="midCollapseAll">Collapse all</button>
      <button class="btn icon" id="midZoomOut">&minus;</button>
      <button class="btn icon" id="midZoomIn">&plus;</button>
      <button class="btn" id="midReset">Reset view</button>
    </div>
    <!-- Objections controls -->
    <div class="ctls" id="ctlsObj" style="display:none">
      <button class="btn" id="objExpandAll">Expand all</button>
      <button class="btn" id="objCollapseAll">Collapse all</button>
      <button class="btn icon" id="objZoomOut">&minus;</button>
      <button class="btn icon" id="objZoomIn">&plus;</button>
      <button class="btn" id="objReset">Reset view</button>
    </div>
    <!-- Closing controls -->
    <div class="ctls" id="ctlsClose" style="display:none">
      <button class="btn" id="closeExpandAll">Expand all</button>
      <button class="btn" id="closeCollapseAll">Collapse all</button>
      <button class="btn icon" id="closeZoomOut">&minus;</button>
      <button class="btn icon" id="closeZoomIn">&plus;</button>
      <button class="btn" id="closeReset">Reset view</button>
    </div>
  </div>

  <div id="viewport">
    <div id="world">
      <svg id="links"></svg>
      <div id="cards"></div>
    </div>
  </div>

  <div id="viewportMid" style="display:none">
    <div id="worldMid">
      <svg id="linksMid"></svg>
      <div id="cardsMid"></div>
    </div>
  </div>

  <div id="viewportObj" style="display:none">
    <div id="worldObj">
      <svg id="linksObj"></svg>
      <div id="cardsObj"></div>
    </div>
  </div>

  <div id="viewportClose" style="display:none">
    <div id="worldClose">
      <svg id="linksClose"></svg>
      <div id="cardsClose"></div>
    </div>
  </div>

  <div class="legend">
    <b>Drag</b> to pan · <b>Scroll</b> to zoom · <b>Click a card</b> to expand · <b>💬</b> on any card to suggest an edit
  </div>

<script>
/* ============================== DATA ============================== */
const OPENERS = [
  {
    n:'01', title:'Competitor Observation', accent:'#41AAEB',
    useWhen:'Use when: a vendor is visible on their website.',
    script:`"Hey [First Name] — this is [Your Name], how's it going? Yeah, so the reason I was calling in — I'm with GovWell, we make [permitting / inspections] software. I was poking around on [City/County]'s website, and saw y'all were using [Competitor]. Figured I'd call in and see how that's been treating you."`,
    branches:[
      { resp:`"It's fine / good"`, moves:[
        { text:`"Glad to hear it. Are you using it for inspections and plan review too, or mainly just permitting?"` },
        { probe:true, text:`"Gotcha. Are y'all using it for [inspections / plan review / online apps] as well, or mainly just the [permitting] side?"` },
      ]},
      { resp:`"Shares pain"`, moves:[
        { text:`Repeat back what they said, then: "Yeah, we hear that a lot from [vendor] shops — that's actually why a lot of cities switch."` },
      ]},
      { resp:`"Not interested"`, moves:[
        { text:`"Totally fair — are you locked into a contract, or just happy with where things are?"` },
      ]},
    ]
  },
  {
    n:'02', title:'Gap Observation', accent:'#39C25E',
    useWhen:'Use when: no vendor visible — no portal or online submission on their site.',
    script:`"Hey [First Name] — this is [Your Name]. Yeah, I'm calling because I was looking on y'all's website and I didn't see a place to submit [building permits] online. I was wondering if that's the case, or if I'm just missing it."`,
    branches:[
      { resp:`"Yeah, still on paper"`, moves:[
        { text:`"Got it — a lot of cities your size are still there. How are you tracking status internally?"` },
      ]},
      { resp:`"We use [system]"`, moves:[
        { text:`"Oh nice — how's that been working for the team?"` },
      ]},
      { resp:`"It's on the site, you missed it"`, moves:[
        { text:`"Oh good — sorry about that! Out of curiosity, how long have you been on that system?"` },
      ]},
    ]
  },
  {
    n:'03', title:'Internal Referral', accent:'#bc8cff',
    useWhen:'Use when: someone else at this org pointed you here.',
    script:`"Hey [First Name] — this is [Your Name] from GovWell. I spoke with [Name] over in [dept / role], and they mentioned you were the main person on the [permitting / planning] side. Wanted to introduce myself."`,
    branches:[
      { resp:`"Yeah, I know [Name]"`, moves:[
        { text:`"Yeah, they were helpful. Wanted to get a sense of how you're currently handling [workflow]."` },
        { probe:true, text:`"[Name] mentioned you're the main user of [system] — how's that been going for you day-to-day?"` },
      ]},
      { resp:`"I don't know who that is"`, moves:[
        { text:`"No worries — I was calling because we work with a few cities in [state] on permitting and wanted to introduce GovWell."` },
      ]},
    ]
  },
  {
    n:'04', title:'Neighbor Reference', accent:'#f0883e',
    useWhen:'Use when: a GovWell customer is in a nearby city/county you can name.',
    script:`"Hey [First Name] — this is [Your Name] from GovWell. We started working with [Nearby City] recently — so we're reaching out to some of the neighboring cities to introduce ourselves. Is now an okay time?"`,
    branches:[
      { resp:`"Oh yeah, I know them"`, moves:[
        { text:`"Yeah, they were a [paper / old system] shop before — wanted to see if you had the same setup."` },
      ]},
      { resp:`"Good for them"`, moves:[
        { text:`"Ha — fair enough. Curious what you're using on your end for permitting — still on [system] or something different?"` },
      ]},
      { resp:`"We just renewed our contract"`, moves:[
        { text:`"Oh good to know — how long did you sign for? Just so I know when it might be worth touching base again."` },
      ]},
    ]
  },
];

/* ============================== BUILD TREE ============================== */
let _id = 0;
function node(props){ return Object.assign({id:'n'+(_id++), children:[], expanded:false}, props); }

const root = node({ type:'start', expanded:true, accent:'#41AAEB' });
OPENERS.forEach(op=>{
  const o = node({ type:'opener', accent:op.accent, num:op.n, title:op.title,
                   useWhen:op.useWhen, script:op.script });
  op.branches.forEach(br=>{
    const r = node({ type:'response', accent:op.accent, text:br.resp });
    br.moves.forEach(mv=>{
      r.children.push(node({ type:'move', accent:op.accent, text:mv.text, probe:!!mv.probe }));
    });
    o.children.push(r);
  });
  root.children.push(o);
});

/* ---- "Add a block" placeholders (shared by all four modules) ---- */
/* Appends one ghost "add" node to the end of every series of sibling  */
/* blocks so reps can propose a new block. Click is handled by the      */
/* feedback module. Built once; never part of saved content.           */
function addLabel(parentType, lastChildType){
  switch(lastChildType){
    case 'opener':    return 'Propose a new opener';
    case 'response':  return 'Add a prospect response';
    case 'track':     return 'Propose a new track';
    case 'qcard':     return 'Propose a new question';
    case 'objection': return 'Propose a new objection';
    case 'ask':       return 'Propose a new ask';
    case 'scenario':  return 'Propose a new scenario';
    case 'move':
      if(parentType==='response') return 'Add a follow-up move';
      if(parentType==='objection') return 'Add a response or example';
      if(parentType==='ask')       return 'Add a phrasing';
      if(parentType==='scenario')  return 'Add a step or note';
      return 'Add another';
    default: return 'Add new';
  }
}
function addPlaceholders(n, make){
  if(n.children && n.children.length){
    n.children.forEach(c=>addPlaceholders(c, make));
    const ref = n.children[n.children.length-1];
    n.children.push(make({ type:'add', accent:'#7C7C7C', addlabel: addLabel(n.type, ref.type) }));
  }
}
addPlaceholders(root, node);

/* ============================== LAYOUT CONSTANTS ============================== */
const CARD_W = 272;
const COL_W  = 372;   // horizontal column pitch
const V_GAP  = 20;    // vertical gap between leaf cards

/* ============================== RENDER ============================== */
const viewport = document.getElementById('viewport');
const world    = document.getElementById('world');
const cardsEl  = document.getElementById('cards');
const svg      = document.getElementById('links');
const SVGNS    = 'http://www.w3.org/2000/svg';

let tx=80, ty=0, scale=1, firstRun=true;
const elMap = new Map();

function buildCards(){
  cardsEl.innerHTML='';
  elMap.clear();
  (function walk(n, depth){
    const el = makeCard(n);
    cardsEl.appendChild(el);
    elMap.set(n.id, el);
    if(n.expanded) n.children.forEach(c=>walk(c, depth+1));
  })(root,0);
}

function makeCard(n){
  const el = document.createElement('div');
  el.className = 'card ' + n.type + (n.probe?' probe':'') +
                 (n.children.length?' has':'');
  el.style.setProperty('--accent', n.accent);
  const kids = n.children.filter(c=>c.type!=='add').length;

  if(n.type==='start'){
    el.innerHTML = `<div class="big">📞 Call Start</div>
      <div class="hint">Pick an opener →</div>`;
  } else if(n.type==='opener'){
    el.innerHTML = `
      <div class="top">
        <span class="num">${n.num}</span>
        <span class="title">${n.title}</span>
        ${kids?`<span class="pill">${n.expanded?'▾':'▸ '+kids}</span>`:''}
      </div>
      <div class="usewhen">${n.useWhen}</div>
      <div class="body script">${n.script}</div>`;
  } else if(n.type==='response'){
    el.innerHTML = `
      <div class="top">
        <span class="label">They say</span>
        ${kids?`<span class="pill">${n.expanded?'▾':'▸ '+kids}</span>`:''}
      </div>
      <div class="body">${n.text}</div>`;
  } else if(n.type==='add'){
    el.dataset.add = n.addlabel;
    el.innerHTML = `<div class="add-inner">+ ${n.addlabel}</div>`;
  } else { // move / probe
    el.innerHTML = `
      <div class="top"><span class="label">${n.probe?'Probe':'Your move'}</span></div>
      <div class="body">${n.text}</div>`;
  }

  el.addEventListener('click', (e)=>{
    if(!n.children.length) return;
    // don't toggle if the user is selecting/copying text
    const sel = window.getSelection();
    if(sel && !sel.isCollapsed) return;
    n.expanded = !n.expanded;
    render();
  });
  return el;
}

function layout(){
  let cursor = 0;
  (function place(n, depth){
    n.x = depth * COL_W;
    const kids = n.expanded ? n.children : [];
    if(kids.length===0){
      n.y = cursor;
      cursor += n.h + V_GAP;
    } else {
      kids.forEach(k=>place(k, depth+1));
      const f=kids[0], l=kids[kids.length-1];
      n.y = (f.y + f.h/2 + l.y + l.h/2)/2 - n.h/2;
    }
  })(root,0);
}

function drawLinks(){
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  (function walk(n){
    if(!n.expanded) return;
    n.children.forEach(c=>{
      const x1=n.x+CARD_W, y1=n.y+n.h/2, x2=c.x, y2=c.y+c.h/2;
      const mx=(x1+x2)/2;
      const p=document.createElementNS(SVGNS,'path');
      p.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
      p.setAttribute('fill','none');
      p.setAttribute('stroke',c.accent);
      p.setAttribute('stroke-width','2');
      p.setAttribute('stroke-opacity','.55');
      svg.appendChild(p);
      walk(c);
    });
  })(root);
}

function render(){
  buildCards();
  // measure heights
  elMap.forEach((el,id)=>{}); // ensure in DOM
  const measure = (n)=>{
    const el=elMap.get(n.id);
    n.h = el ? el.offsetHeight : 60;
    n.w = CARD_W;
    if(n.expanded) n.children.forEach(measure);
  };
  measure(root);

  layout();

  // normalize so min y = 0
  let minY=Infinity, maxX=0, maxY=0;
  const scan=(n)=>{ minY=Math.min(minY,n.y); maxY=Math.max(maxY,n.y+n.h);
    maxX=Math.max(maxX,n.x+CARD_W); if(n.expanded) n.children.forEach(scan); };
  scan(root);
  const shift = (minY<0)? -minY : 0;
  const applyShift=(n)=>{ n.y+=shift; if(n.expanded) n.children.forEach(applyShift); };
  applyShift(root);
  maxY+=shift;

  // position cards
  const pos=(n)=>{ const el=elMap.get(n.id); el.style.left=n.x+'px'; el.style.top=n.y+'px';
    if(n.expanded) n.children.forEach(pos); };
  pos(root);

  svg.setAttribute('width', maxX+40);
  svg.setAttribute('height', maxY+40);
  svg.style.width=(maxX+40)+'px';
  svg.style.height=(maxY+40)+'px';
  drawLinks();

  if(firstRun){
    firstRun=false;
    ty = Math.max(20, (viewport.clientHeight - maxY)/2);
    applyTransform();
  }
}

function applyTransform(){
  world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
}

/* ============================== PAN ============================== */
let panning=false, sx=0, sy=0, stx=0, sty=0;
viewport.addEventListener('mousedown',(e)=>{
  if(e.target.closest('.card')) return;       // let cards handle their own clicks
  panning=true; sx=e.clientX; sy=e.clientY; stx=tx; sty=ty;
  viewport.classList.add('panning');
});
window.addEventListener('mousemove',(e)=>{
  if(!panning) return;
  tx=stx+(e.clientX-sx); ty=sty+(e.clientY-sy); applyTransform();
});
window.addEventListener('mouseup',()=>{ panning=false; viewport.classList.remove('panning'); });

/* ============================== ZOOM ============================== */
function zoomAt(factor, cx, cy){
  const ns=Math.min(1.7, Math.max(0.35, scale*factor));
  const k=ns/scale;
  // keep point under cursor fixed
  tx = cx - (cx - tx)*k;
  ty = cy - (cy - ty)*k;
  scale=ns; applyTransform();
}
viewport.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const r=viewport.getBoundingClientRect();
  // proportional, dampened zoom: smooth for both trackpad and mouse wheel
  const d=Math.max(-60,Math.min(60,e.deltaY));   // clamp big wheel jumps
  zoomAt(Math.exp(-d*0.0022), e.clientX-r.left, e.clientY-r.top);
},{passive:false});

document.getElementById('zoomIn').onclick  =()=>zoomAt(1.15, viewport.clientWidth/2, viewport.clientHeight/2);
document.getElementById('zoomOut').onclick =()=>zoomAt(1/1.15, viewport.clientWidth/2, viewport.clientHeight/2);
document.getElementById('reset').onclick   =()=>{ scale=1; tx=80; firstRun=true; render(); };

/* ============================== EXPAND / COLLAPSE ALL ============================== */
function setAll(state){
  (function w(n){
    if(n.children.length) n.expanded = state;
    n.children.forEach(w);
  })(root);
  root.expanded=true; // start always shows openers
  render();
}
document.getElementById('expandAll').onclick  =()=>setAll(true);
document.getElementById('collapseAll').onclick=()=>{ setAll(false);
  root.children.forEach(o=>o.expanded=false); render(); };

window.addEventListener('resize',()=>{ /* keep transform; nothing required */ });

/* ============================== GO ============================== */
render();

/* ======================= MIDGAME MODULE =========================== */
/* Independent engine — its own scope, DOM containers, and state.     */
/* Does not touch the opener engine above.                            */
/* ================================================================== */
const Midgame = (function(){

  /* =============================================================== */
  /* ===================== MIDGAME DATA (edit here) ================ */
  /* Two tracks. Each question = one card holding the category,      */
  /* 1–2 verbatim phrasings, and a one-line phrasing note.           */
  /* A phrasing may carry an optional `hint` (a small instruction    */

  /* =============================================================== */
  const TRACKS = [

    /* ---- TRACK 1: PROCESS QUESTIONS — map the prospect's current workflows ---- */
    {
      num:'T1', title:'Process Questions', accent:'#41AAEB',
      subtitle:'Map their current workflows.',
      questions:[
        { cat:'Permitting',

            { say:`"I noticed there wasn't an online portal for permit applications — how are you guys thinking about that process?"` },
            { say:`"How do you track all of those? Do you ever have anything slip through the cracks?"` },
          ],
          note:`Reference something specific and observable — a generic "what do you use?" returns a one-word answer.` },

        { cat:'Plan Review',

            { say:`"Is plan review handled through [their system], or are you using a third party — like Bluebeam?"` },
            { say:`"Does [system] offer automated plan review, or is that done manually?"` },

            { say:`"When you're out in the field making an inspection, are you logging it on a tablet or still paper-based?"` },
          ],
          note:`Mobile/offline capability is a reliable pain opener — field staff almost always have friction here.` },

        { cat:'Code Enforcement',
          phrasings:[
            { say:`"I didn't see a place to submit code enforcement complaints online on your site — is that the case?"` },
            { say:`"Do you think having a system to track that online would make your life easier?"` },
          ],
          note:`The gap observation works especially well here — most municipal sites visibly lack an online complaint portal.` },

        { cat:'Planning & Zoning',
          phrasings:[
            { say:`"Does planning and zoning sit at the county level, or is that handled by the individual cities?"`, hint:`Jurisdiction qualifier — ask this first.` },
            { say:`"What's your current zoning process, and how's it been working for you?"` },
          ],
          note:`Qualify jurisdiction before diving into process — many counties don't handle building permits and the probe becomes irrelevant.` },

        { cat:'Licensing',
          phrasings:[
            { say:`"Who handles business licenses — is that the clerk's office, or a different department?"`, hint:`Establish ownership first.` },
            { say:`"How are you processing licenses — business, contractor, liquor licenses? Do you have a system managing those?"` },
          ],
          note:`Start with who handles it before probing pain — licensing ownership varies widely across jurisdictions.` },
      ]
    },

    /* ---- TRACK 2: SYSTEM PAIN QUESTIONS — surface dissatisfaction with current vendor ---- */
    {
      num:'T2', title:'System Pain Questions', accent:'#f0883e',
      subtitle:'Surface dissatisfaction with their current vendor.',
      questions:[
        { cat:'How Long on Current System',
          phrasings:[
            { say:`"How long have you been on it?"`, hint:`Ask immediately after they name the vendor.` },
            { say:`"How long have you guys been on it — I know it's more of a legacy system."` },
          ],
          note:`Ask right after they name the vendor — later it feels interrogative.` },

        { cat:'Customer Support Quality', flag:true,
          phrasings:[
            { say:`"When something goes wrong — like a bug or you need help — what does that look like? Is there someone you can call, or is it more of a ticket? And how long does it typically take?"` },
            { say:`"When things do arise, are they pretty quick at resolving them? How's the support looking?"` },
          ],
          note:`Specificity unlocks pain — every legacy software user has a support horror story they've accepted as normal. "Is it a ticket? How long?" is the unlock phrase.` },

        { cat:'Incomplete Applications',
          phrasings:[
            { say:`"When applicants submit permits, are they usually complete and workable, or do you end up sending a lot back?"` },
            { say:`"Do contractors have to resubmit their info every time they pull a permit, or is that stored somewhere?"` },
          ],
          note:`Almost never asked proactively — surfaces significant pain when it does.` },

        { cat:'Reliability / Downtime',
          phrasings:[
            { say:`"Does your system ever go down? What happens to your workflow when it does?"` },
            { say:`"Any issues with slowness or outages — especially during busy seasons?"` },
          ],
          note:`Currently never asked by any rep — a complete gap in the team's repertoire.` },

        { cat:'Reporting to Council / Boards',
          phrasings:[
            { say:`"When your council or board asks for permit data or code enforcement stats, how do you pull that?"` },
            { say:`"How's reporting — if you want to see how many permits are open or what your inspection load looks like?"` },
          ],
          note:`High-value, low-frequency — the one time it was asked on a recorded call, it immediately surfaced pain.` },
      ]
    },
  ];
  /* ===================== END MIDGAME DATA ======================== */

  /* ---- Build tree: start -> tracks -> question cards ---- */
  let _id=0;
  const mk = p => Object.assign({id:'m'+(_id++),children:[],expanded:false},p);
  const root = mk({type:'start',expanded:true,accent:'#41AAEB'});
  TRACKS.forEach(t=>{
    const tn = mk({type:'track',accent:t.accent,num:t.num,title:t.title,subtitle:t.subtitle});
    t.questions.forEach(q=>{
      tn.children.push(mk({type:'qcard',accent:t.accent,cat:q.cat,phrasings:q.phrasings,note:q.note,flag:!!q.flag}));
    });
    root.children.push(tn);
  });
  addPlaceholders(root, mk);

  /* ---- DOM + constants ---- */
  const V=document.getElementById('viewportMid');
  const W=document.getElementById('worldMid');
  const C=document.getElementById('cardsMid');
  const S=document.getElementById('linksMid');
  const NS='http://www.w3.org/2000/svg';
  const CARD_W=272, COL_W=372, V_GAP=20;
  let tx=80, ty=0, scale=1, firstRun=true, rendered=false;
  const elMap=new Map();
  let refEl=null;

  function makeCard(n){
    const el=document.createElement('div');
    el.className='card '+ n.type + (n.children.length?' has':'');
    el.style.setProperty('--accent', n.accent);
    const kids=n.children.filter(c=>c.type!=='add').length;

    if(n.type==='start'){
      el.innerHTML=`<div class="big">🔎 Midgame · Discovery</div>
        <div class="hint">Pick a track →</div>`;
    } else if(n.type==='track'){
      el.innerHTML=`
        <div class="top">
          <span class="num">${n.num}</span>
          <span class="title">${n.title}</span>
          ${kids?`<span class="pill">${n.expanded?'▾':'▸ '+kids}</span>`:''}
        </div>
        <div class="usewhen">${n.subtitle}</div>`;
    } else if(n.type==='add'){
      el.dataset.add=n.addlabel;
      el.innerHTML=`<div class="add-inner">+ ${n.addlabel}</div>`;
    } else { // qcard (leaf)
      const says=n.phrasings.map(p=>
        `<div class="qsay">${p.say}${p.hint?`<span class="qhint">${p.hint}</span>`:''}</div>`
      ).join('');
      el.innerHTML=`
        <div class="top">
          <span class="label">${n.cat}</span>
          ${n.flag?`<span class="flag">★ High value</span>`:''}
        </div>
        ${says}
        <div class="qnote">${n.note}</div>`;
    }

    el.addEventListener('click',()=>{
      if(!n.children.length) return;
      const sel=window.getSelection(); if(sel&&!sel.isCollapsed) return;
      n.expanded=!n.expanded; render();
    });
    return el;
  }

  /* Static sequencing reference card — not part of the node tree, never expands */
  function makeRef(){
    const el=document.createElement('div');
    el.className='card refcard';
    el.innerHTML=`
      <div class="top"><span class="label">📋 Discovery Order</span></div>
      <ol>
        <li>What system / process are you using?</li>
        <li>How long have you been on it?</li>
        <li>How's it going?</li>
        <li>What are you using it for? <span class="dim">(scope)</span></li>
        <li>Anything you wish it did better?</li>
        <li>Customer support probe <span class="dim">— if lukewarm or negative</span></li>
        <li>Who else is involved in decisions like this?</li>
        <li>What does timing look like?</li>
      </ol>
      <div class="avoid"><b>Avoid:</b> asking about contract or price before establishing pain.</div>`;
    return el;
  }

  function drawLinks(){
    while(S.firstChild) S.removeChild(S.firstChild);
    (function walk(n){
      if(!n.expanded) return;
      n.children.forEach(c=>{
        const x1=n.x+CARD_W, y1=n.y+n.h/2, x2=c.x, y2=c.y+c.h/2, mx=(x1+x2)/2;
        const p=document.createElementNS(NS,'path');
        p.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        p.setAttribute('fill','none');
        p.setAttribute('stroke',c.accent);
        p.setAttribute('stroke-width','2');
        p.setAttribute('stroke-opacity','.55');
        S.appendChild(p);
        walk(c);
      });
    })(root);
  }

  function render(){
    rendered=true;
    C.innerHTML=''; elMap.clear();
    // tree cards
    (function walk(n){ const el=makeCard(n); C.appendChild(el); elMap.set(n.id,el);
      if(n.expanded) n.children.forEach(walk); })(root);
    // static reference card
    refEl=makeRef(); C.appendChild(refEl);

    // measure
    const measure=n=>{ const el=elMap.get(n.id); n.h=el?el.offsetHeight:60; n.w=CARD_W;
      if(n.expanded) n.children.forEach(measure); };
    measure(root);
    const refH=refEl.offsetHeight;

    // layout — depth offset +1 so the reference card occupies column 0
    let cursor=0;
    (function place(n,depth){
      n.x=(depth+1)*COL_W;
      const kids=n.expanded?n.children:[];
      if(!kids.length){ n.y=cursor; cursor+=n.h+V_GAP; }
      else { kids.forEach(k=>place(k,depth+1));
        const f=kids[0], l=kids[kids.length-1];
        n.y=(f.y+f.h/2+l.y+l.h/2)/2 - n.h/2; }
    })(root,0);

    // normalize tree top to 0, then vertically center tree vs. reference card
    let minY=Infinity,maxX=0,maxYb=0;
    const scan=n=>{ minY=Math.min(minY,n.y); maxYb=Math.max(maxYb,n.y+n.h);
      maxX=Math.max(maxX,n.x+CARD_W); if(n.expanded) n.children.forEach(scan); };
    scan(root);
    const shift = minY<0 ? -minY : -minY;            // bring min to 0
    const treeH = maxYb+shift;
    const totalH = Math.max(treeH, refH);
    const treeOff = shift + (totalH-treeH)/2;
    const apply=n=>{ n.y+=treeOff; if(n.expanded) n.children.forEach(apply); };
    apply(root);

    // position cards
    const pos=n=>{ const el=elMap.get(n.id); el.style.left=n.x+'px'; el.style.top=n.y+'px';
      if(n.expanded) n.children.forEach(pos); };
    pos(root);
    refEl.style.left='0px'; refEl.style.top=((totalH-refH)/2)+'px';

    // size svg
    S.setAttribute('width',maxX+40); S.setAttribute('height',totalH+40);
    S.style.width=(maxX+40)+'px'; S.style.height=(totalH+40)+'px';
    drawLinks();

    if(firstRun){ firstRun=false; ty=Math.max(20,(V.clientHeight-totalH)/2); applyTransform(); }
  }

  function applyTransform(){ W.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }

  /* ---- Pan ---- */
  let panning=false,sx=0,sy=0,stx=0,sty=0;
  V.addEventListener('mousedown',e=>{ if(e.target.closest('.card'))return;
    panning=true;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;V.classList.add('panning'); });
  window.addEventListener('mousemove',e=>{ if(!panning)return;
    tx=stx+(e.clientX-sx); ty=sty+(e.clientY-sy); applyTransform(); });
  window.addEventListener('mouseup',()=>{ panning=false; V.classList.remove('panning'); });

  /* ---- Zoom (proportional, dampened — matches opener) ---- */
  function zoomAt(f,cx,cy){ const ns=Math.min(1.7,Math.max(0.35,scale*f)); const k=ns/scale;
    tx=cx-(cx-tx)*k; ty=cy-(cy-ty)*k; scale=ns; applyTransform(); }
  V.addEventListener('wheel',e=>{ e.preventDefault(); const r=V.getBoundingClientRect();
    const d=Math.max(-60,Math.min(60,e.deltaY)); zoomAt(Math.exp(-d*0.0022),e.clientX-r.left,e.clientY-r.top);
  },{passive:false});

  /* ---- Controls ---- */
  document.getElementById('midExpandAll').onclick=()=>{
    (function w(n){ if(n.children.length)n.expanded=true; n.children.forEach(w); })(root);
    root.expanded=true; render(); };
  document.getElementById('midCollapseAll').onclick=()=>{
    (function w(n){ if(n.children.length)n.expanded=false; n.children.forEach(w); })(root);
    root.expanded=true; root.children.forEach(t=>t.expanded=false); render(); };
  document.getElementById('midZoomIn').onclick =()=>zoomAt(1.15, V.clientWidth/2, V.clientHeight/2);
  document.getElementById('midZoomOut').onclick=()=>zoomAt(1/1.15, V.clientWidth/2, V.clientHeight/2);
  document.getElementById('midReset').onclick  =()=>{ scale=1; tx=80; firstRun=true; render(); };

  // Render lazily on first view (heights must be measured while visible)
  return { ensure(){ if(!rendered) render(); } };
})();

/* ====================== OBJECTIONS MODULE ========================= */

const Objections = (function(){

  /* =================== OBJECTIONS DATA (edit here) =============== */
